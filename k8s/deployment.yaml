apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-despacho
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back-despacho
  template:
    metadata:
      labels:
        app: back-despacho
    spec:
      containers:
        - name: back-despacho
          image: criss247/back-ventas:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "test"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "750m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: back-despacho-service
spec:
  type: LoadBalancer
  selector:
    app: back-despacho
  ports:
    - port: 8080
      targetPort: 8080